```yaml
name: Release - Cross Platform Build

"on":
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # LINUX BUILDS (x86_64, arm64 native, arm64 cross)
  # ───────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            cross: false
          - arch: arm64
            runner: ubuntu-24.04-arm
            cross: false
          - arch: arm64-cross
            runner: ubuntu-24.04
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (native)
        if: ${{ !matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecp256k1-dev libssl-dev

      - name: Install dependencies (cross-compile ARM64)
        if: ${{ matrix.cross }}
        run: |
          sudo dpkg --add-architecture arm64

          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('/etc/apt/sources.list.d/ubuntu.sources')
          txt = p.read_text()
          out = []
          for line in txt.splitlines():
              out.append(line)
              if line.startswith('Types:') and not any('Architectures' in l for l in out[-5:]):
                  out.append('Architectures: amd64')
          p.write_text('\n'.join(out) + '\n')
          PYEOF
          fi

          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i '/^deb /s/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          fi

          sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            crossbuild-essential-arm64 \
            libssl-dev:arm64

          git clone https://github.com/bitcoin-core/secp256k1.git /tmp/secp256k1
          cd /tmp/secp256k1
          cmake -B build \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_INSTALL_PREFIX=/usr/aarch64-linux-gnu \
            -DCMAKE_BUILD_TYPE=Release \
            -DSECP256K1_BUILD_TESTS=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_ENABLE_MODULE_RECOVERY=ON
          cmake --build build -j$(nproc)
          sudo cmake --install build

      - name: Build bloom_builder
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            make bloom_builder \
              CC=aarch64-linux-gnu-gcc \
              CXX=aarch64-linux-gnu-g++ \
              CXXFLAGS="-O3 -std=c++17 -pthread -Wall -Wextra -Wshadow -march=armv8-a -I/usr/aarch64-linux-gnu/include" \
              LDFLAGS="-L/usr/aarch64-linux-gnu/lib -lsecp256k1 -lssl -lcrypto"
          else
            make bloom_builder \
              CC=gcc CXX=g++ \
              CXXFLAGS="-O3 -std=c++17 -pthread -Wall -Wextra -Wshadow -march=native" \
              LDFLAGS=""
          fi

      - name: Build scanner
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            make scanner \
              CC=aarch64-linux-gnu-gcc \
              CXX=aarch64-linux-gnu-g++ \
              CXXFLAGS="-O3 -std=c++17 -pthread -Wall -Wextra -Wshadow -march=armv8-a -I/usr/aarch64-linux-gnu/include" \
              LDFLAGS="-L/usr/aarch64-linux-gnu/lib -lsecp256k1 -lssl -lcrypto"
          else
            make scanner \
              CC=gcc CXX=g++ \
              CXXFLAGS="-O3 -std=c++17 -pthread -Wall -Wextra -Wshadow -march=native" \
              LDFLAGS="-lsecp256k1 -lssl -lcrypto"
          fi

      - name: Build scanner-pg
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            echo "Skipping PostgreSQL build for cross-compile"
            touch scanner-pg
          else
            sudo apt-get install -y libpq-dev
            make scanner-pg \
              CC=gcc CXX=g++ \
              CXXFLAGS="-O3 -std=c++17 -pthread -Wall -Wextra -Wshadow -march=native" \
              LDFLAGS="-lsecp256k1 -lssl -lcrypto -lpq"
          fi

      - name: Package binaries
        run: |
          mkdir -p dist/btc-scanner-linux-${{ matrix.arch }}
          cp bloom_builder dist/btc-scanner-linux-${{ matrix.arch }}/ || true
          cp scanner dist/btc-scanner-linux-${{ matrix.arch }}/ || true
          [ -f scanner-pg ] && cp scanner-pg dist/btc-scanner-linux-${{ matrix.arch }}/ || true
          cp Makefile README.md LICENSE* dist/btc-scanner-linux-${{ matrix.arch }}/ 2>/dev/null || true
          cd dist
          tar czf btc-scanner-linux-${{ matrix.arch }}.tar.gz btc-scanner-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/*.tar.gz

  # ───────────────────────────────────────────────────────────────────────────
  # macOS ARM64 ONLY
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS arm64
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install secp256k1 openssl pkg-config libpq

      - name: Build bloom_builder
        run: |
          BREW_OPENSSL=$(brew --prefix openssl)
          BREW_SECP=$(brew --prefix secp256k1)
          make bloom_builder \
            CXX=g++ \
            CXXFLAGS="-O3 -std=c++17 -pthread -Wall -Wextra -Wshadow -arch arm64 -I${BREW_OPENSSL}/include -I${BREW_SECP}/include" \
            LDFLAGS="-L${BREW_OPENSSL}/lib -L${BREW_SECP}/lib"

      - name: Build scanner
        run: |
          BREW_OPENSSL=$(brew --prefix openssl)
          BREW_SECP=$(brew --prefix secp256k1)
          make scanner \
            CXX=g++ \
            CXXFLAGS="-O3 -std=c++17 -pthread -Wall -Wextra -Wshadow -arch arm64 -I${BREW_OPENSSL}/include -I${BREW_SECP}/include" \
            LDFLAGS="-L${BREW_OPENSSL}/lib -L${BREW_SECP}/lib -lsecp256k1 -lssl -lcrypto"

      - name: Build scanner-pg
        run: |
          BREW_OPENSSL=$(brew --prefix openssl)
          BREW_SECP=$(brew --prefix secp256k1)
          BREW_PQ=$(brew --prefix libpq)
          make scanner-pg \
            CXX=g++ \
            CXXFLAGS="-O3 -std=c++17 -pthread -Wall -Wextra -Wshadow -arch arm64 -I${BREW_OPENSSL}/include -I${BREW_SECP}/include -I${BREW_PQ}/include" \
            LDFLAGS="-L${BREW_OPENSSL}/lib -L${BREW_SECP}/lib -L${BREW_PQ}/lib -lsecp256k1 -lssl -lcrypto -lpq"

      - name: Package binaries
        run: |
          mkdir -p dist/btc-scanner-macos-arm64
          cp bloom_builder scanner scanner-pg dist/btc-scanner-macos-arm64/
          cp Makefile README.md LICENSE* dist/btc-scanner-macos-arm64/ 2>/dev/null || true
          cd dist
          tar czf btc-scanner-macos-arm64.tar.gz btc-scanner-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*.tar.gz

  # ───────────────────────────────────────────────────────────────────────────
  # CREATE RELEASE
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Bitcoin Address Scanner ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
