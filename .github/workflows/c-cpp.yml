
name: Release - Cross Platform Build

"on":
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
      - 'v*.*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CXXFLAGS: -O3 -std=c++17 -pthread -Wall -Wextra -Wshadow

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # LINUX BUILDS
  # ───────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            cross: false
          - arch: arm64
            runner: ubuntu-24.04-arm
            cross: false
          - arch: arm64-cross
            runner: ubuntu-24.04
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (native)
        if: ${{ !matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecp256k1-dev libssl-dev

      - name: Install dependencies (cross-compile ARM64)
        if: ${{ matrix.cross }}
        run: |
          sudo dpkg --add-architecture arm64

          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo python3 - <<'PYEOF'
          import pathlib
          p = pathlib.Path('/etc/apt/sources.list.d/ubuntu.sources')
          txt = p.read_text()
          out = []
          for line in txt.splitlines():
              out.append(line)
              if line.startswith('Types:') and not any('Architectures' in l for l in out[-5:]):
                  out.append('Architectures: amd64')
          p.write_text('\n'.join(out) + '\n')
          PYEOF
          fi

          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i '/^deb /s/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          fi

          sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            crossbuild-essential-arm64 \
            libssl-dev:arm64

          git clone https://github.com/bitcoin-core/secp256k1.git /tmp/secp256k1
          cd /tmp/secp256k1
          cmake -B build \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_INSTALL_PREFIX=/usr/aarch64-linux-gnu \
            -DCMAKE_BUILD_TYPE=Release \
            -DSECP256K1_BUILD_TESTS=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_ENABLE_MODULE_RECOVERY=ON
          cmake --build build -j$(nproc)
          sudo cmake --install build

      - name: Set build flags (cross-compile)
        if: ${{ matrix.cross }}
        run: |
          echo "CC=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "CXXFLAGS_EXTRA=-march=armv8-a -I/usr/aarch64-linux-gnu/include" >> $GITHUB_ENV
          echo "LDFLAGS_EXTRA=-L/usr/aarch64-linux-gnu/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/aarch64-linux-gnu/lib/pkgconfig" >> $GITHUB_ENV

      - name: Set build flags (native)
        if: ${{ !matrix.cross }}
        run: |
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV
          echo "CXXFLAGS_EXTRA=-march=native" >> $GITHUB_ENV
          echo "LDFLAGS_EXTRA=" >> $GITHUB_ENV

      - name: Build bloom_builder
        run: |
          make bloom_builder \
            CC="${CC}" \
            CXX="${CXX}" \
            CXXFLAGS="${CXXFLAGS} ${CXXFLAGS_EXTRA}" \
            LDFLAGS="${LDFLAGS} ${LDFLAGS_EXTRA}"

      - name: Build scanner
        run: |
          make scanner \
            CC="${CC}" \
            CXX="${CXX}" \
            CXXFLAGS="${CXXFLAGS} ${CXXFLAGS_EXTRA}" \
            LDFLAGS="${LDFLAGS} ${LDFLAGS_EXTRA}"

      - name: Build scanner-pg
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            echo "Skipping PostgreSQL build for cross-compile"
            touch scanner-pg
          else
            sudo apt-get install -y libpq-dev
            make scanner-pg \
              CC="${CC}" \
              CXX="${CXX}" \
              CXXFLAGS="${CXXFLAGS} ${CXXFLAGS_EXTRA}" \
              LDFLAGS="${LDFLAGS} ${LDFLAGS_EXTRA}"
          fi

      - name: Package binaries
        run: |
          mkdir -p dist/btc-scanner-linux-${{ matrix.arch }}
          cp bloom_builder dist/btc-scanner-linux-${{ matrix.arch }}/ || true
          cp scanner dist/btc-scanner-linux-${{ matrix.arch }}/ || true
          [ -f scanner-pg ] && cp scanner-pg dist/btc-scanner-linux-${{ matrix.arch }}/ || true
          cp Makefile README.md LICENSE* dist/btc-scanner-linux-${{ matrix.arch }}/ 2>/dev/null || true
          cd dist
          tar czf btc-scanner-linux-${{ matrix.arch }}.tar.gz btc-scanner-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/*.tar.gz

  # ───────────────────────────────────────────────────────────────────────────
  # macOS BUILDS
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-14
          - arch: arm64
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install secp256k1 openssl pkg-config libpq

      - name: Set environment variables
        run: |
          BREW_OPENSSL=$(brew --prefix openssl)
          BREW_SECP=$(brew --prefix secp256k1)
          BREW_PQ=$(brew --prefix libpq)
          echo "OPENSSL_ROOT=${BREW_OPENSSL}" >> $GITHUB_ENV
          echo "SECP_ROOT=${BREW_SECP}" >> $GITHUB_ENV
          echo "PQ_ROOT=${BREW_PQ}" >> $GITHUB_ENV

      - name: Build bloom_builder
        run: |
          make bloom_builder \
            CXXFLAGS="${CXXFLAGS} -arch ${{ matrix.arch }} -I${OPENSSL_ROOT}/include -I${SECP_ROOT}/include" \
            LDFLAGS="-L${OPENSSL_ROOT}/lib -L${SECP_ROOT}/lib"

      - name: Build scanner
        run: |
          make scanner \
            CXXFLAGS="${CXXFLAGS} -arch ${{ matrix.arch }} -I${OPENSSL_ROOT}/include -I${SECP_ROOT}/include" \
            LDFLAGS="-L${OPENSSL_ROOT}/lib -L${SECP_ROOT}/lib"

      - name: Build scanner-pg
        run: |
          make scanner-pg \
            CXXFLAGS="${CXXFLAGS} -arch ${{ matrix.arch }} -I${OPENSSL_ROOT}/include -I${SECP_ROOT}/include -I${PQ_ROOT}/include" \
            LDFLAGS="-L${OPENSSL_ROOT}/lib -L${SECP_ROOT}/lib -L${PQ_ROOT}/lib"

      - name: Package binaries
        run: |
          mkdir -p dist/btc-scanner-macos-${{ matrix.arch }}
          cp bloom_builder scanner scanner-pg dist/btc-scanner-macos-${{ matrix.arch }}/
          cp Makefile README.md LICENSE* dist/btc-scanner-macos-${{ matrix.arch }}/ 2>/dev/null || true
          cd dist
          tar czf btc-scanner-macos-${{ matrix.arch }}.tar.gz btc-scanner-macos-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.tar.gz

  # ───────────────────────────────────────────────────────────────────────────
  # WINDOWS BUILDS
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            msystem: MINGW64
            prefix: mingw-w64-x86_64

    # NO global defaults shell here — each step declares its own shell
    steps:
      - uses: actions/checkout@v4

      # Use native Windows git BEFORE MSYS2 is set up
      - name: Clone libsecp256k1
        shell: cmd
        run: git clone https://github.com/bitcoin-core/secp256k1.git C:\secp256k1

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.prefix }}-gcc
            ${{ matrix.prefix }}-make
            ${{ matrix.prefix }}-cmake
            ${{ matrix.prefix }}-openssl
            ${{ matrix.prefix }}-pkg-config
            ${{ matrix.prefix }}-libwinpthread-git

      - name: Build libsecp256k1 (Windows)
        shell: msys2 {0}
        run: |
          cd /c/secp256k1
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/mingw64 \
            -DSECP256K1_BUILD_TESTS=OFF \
            -DSECP256K1_BUILD_EXAMPLES=OFF \
            -DSECP256K1_ENABLE_MODULE_RECOVERY=ON
          cmake --build build -j$(nproc)
          cmake --install build

      - name: Build bloom_builder
        shell: msys2 {0}
        run: |
          mingw32-make bloom_builder \
            CXXFLAGS="${CXXFLAGS} -static-libgcc -static-libstdc++"

      - name: Build scanner
        shell: msys2 {0}
        run: |
          mingw32-make scanner \
            CXXFLAGS="${CXXFLAGS} -static-libgcc -static-libstdc++" \
            LDFLAGS="-static -lws2_32"

      - name: Package binaries
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist\btc-scanner-windows-${{ matrix.arch }}
          Copy-Item bloom_builder.exe, scanner.exe -Destination dist\btc-scanner-windows-${{ matrix.arch }}\ -ErrorAction SilentlyContinue
          Copy-Item Makefile, README.md -Destination dist\btc-scanner-windows-${{ matrix.arch }}\ -ErrorAction SilentlyContinue
          cd dist
          Compress-Archive -Path btc-scanner-windows-${{ matrix.arch }} -DestinationPath btc-scanner-windows-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: dist/*.zip

  # ───────────────────────────────────────────────────────────────────────────
  # CREATE RELEASE
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Bitcoin Address Scanner ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
